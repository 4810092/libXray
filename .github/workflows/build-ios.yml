name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:
    outputs:
      version:
        description: "Build version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout libXray
        uses: actions/checkout@v4
        with:
          path: libXray

      - name: Checkout Xray-core (рядом с libXray)
        uses: actions/checkout@v4
        with:
          repository: XTLS/Xray-core
          path: Xray-core

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: libXray/go.mod
          cache-dependency-path: libXray/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Check Xcode and iOS runtimes
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS || true

      - name: Read version
        id: version
        run: |
          VERSION=$(cat libXray/version.txt | tr -d '[:space:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build iOS (gomobile)
        working-directory: libXray
        run: python3 build/main.py apple gomobile

      - name: Zip XCFramework
        working-directory: libXray
        run: |
          find . -name "*.xcframework" | while read f; do
            zip -r "${f}.zip" "$f"
          done

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ steps.version.outputs.version }}
          path: |
            libXray/**/*.xcframework.zip
          retention-days: 7
